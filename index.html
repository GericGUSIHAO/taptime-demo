<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapTime - 时间的账本</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      background: #FAF9F7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }
    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const iosFrameStyles = {
      wrapper: {
        display: 'inline-block',
        padding: 12,
        background: '#000',
        borderRadius: 60,
        boxShadow: '0 0 0 2px #1f2937, 0 20px 60px rgba(0,0,0,0.3)',
        position: 'relative',
      },
      screen: {
        position: 'relative',
        borderRadius: 48,
        overflow: 'hidden',
        background: '#FAF9F7',
      },
      statusBar: {
        position: 'absolute',
        top: 0,
        left: 0,
        right: 0,
        height: 54,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        padding: '0 32px 0 32px',
        fontSize: 16,
        fontWeight: 600,
        fontFamily: '-apple-system, "SF Pro Text", sans-serif',
        zIndex: 20,
        pointerEvents: 'none',
      },
      dynamicIsland: {
        position: 'absolute',
        top: 12,
        left: '50%',
        transform: 'translateX(-50%)',
        width: 124,
        height: 36,
        background: '#000',
        borderRadius: 999,
        zIndex: 30,
      },
      statusIcons: {
        display: 'flex',
        alignItems: 'center',
        gap: 6,
      },
      signalIcon: {
        display: 'flex',
        alignItems: 'flex-end',
        gap: 2,
        height: 12,
      },
      signalBar: {
        width: 3,
        background: 'currentColor',
        borderRadius: 1,
      },
      batteryIcon: {
        width: 26,
        height: 12,
        border: '1.5px solid currentColor',
        borderRadius: 3,
        padding: 1,
        position: 'relative',
        opacity: 0.8,
      },
      batteryCap: {
        position: 'absolute',
        top: 3,
        right: -3,
        width: 2,
        height: 6,
        background: 'currentColor',
        borderRadius: '0 1px 1px 0',
      },
      content: {
        position: 'absolute',
        top: 54,
        left: 0,
        right: 0,
        bottom: 34,
        overflow: 'auto',
        fontFamily: 'Space Grotesk, sans-serif',
      },
      homeIndicator: {
        position: 'absolute',
        bottom: 10,
        left: '50%',
        transform: 'translateX(-50%)',
        width: 140,
        height: 5,
        background: 'rgba(0,0,0,0.3)',
        borderRadius: 999,
        zIndex: 10,
      },
    };

    function IosFrame({ children, width = 393, height = 852, time = '9:41', battery = 100 }) {
      return (
        <div style={iosFrameStyles.wrapper}>
          <div style={{ ...iosFrameStyles.screen, width, height }}>
            <div style={{ ...iosFrameStyles.statusBar, color: '#000' }}>
              <span>{time}</span>
              <div style={iosFrameStyles.statusIcons}>
                <div style={iosFrameStyles.signalIcon}>
                  <div style={{ ...iosFrameStyles.signalBar, height: 4 }} />
                  <div style={{ ...iosFrameStyles.signalBar, height: 6 }} />
                  <div style={{ ...iosFrameStyles.signalBar, height: 9 }} />
                  <div style={{ ...iosFrameStyles.signalBar, height: 11 }} />
                </div>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{ color: '#000' }}>
                  <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" />
                  <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" />
                  <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7" />
                </svg>
                <div style={iosFrameStyles.batteryIcon}>
                  <div style={{ width: `${battery}%`, height: '100%', background: '#000', borderRadius: 1, opacity: 0.9 }} />
                  <div style={iosFrameStyles.batteryCap} />
                </div>
              </div>
            </div>
            <div style={iosFrameStyles.dynamicIsland} />
            <div style={iosFrameStyles.content}>{children}</div>
            <div style={iosFrameStyles.homeIndicator} />
          </div>
        </div>
      );
    }

    const categories = [
      { id: 'work', name: '工作', icon: '💼', color: '#C45C2E' },
      { id: 'read', name: '阅读', icon: '📖', color: '#4A6FA5' },
      { id: 'exercise', name: '运动', icon: '🏃', color: '#5B9A6F' },
      { id: 'rest', name: '休息', icon: '☕', color: '#8B7355' },
      { id: 'eat', name: '吃饭', icon: '🍽', color: '#D4A373' },
      { id: 'game', name: '游戏', icon: '🎮', color: '#8B5CF6' },
    ];

    const durations = ['15m', '30m', '45m', '1h', '1.5h', '2h'];
    const durationMinutes = { '15m': 15, '30m': 30, '45m': 45, '1h': 60, '1.5h': 90, '2h': 120 };

    const weekDays = ['一', '二', '三', '四', '五', '六', '日'];

    const getTodayRecords = () => {
      const stored = localStorage.getItem('taptime_today');
      if (stored) return JSON.parse(stored);
      return [
        { id: 1, category: 'work', duration: 150, timestamp: Date.now() - 3600000 },
        { id: 2, category: 'read', duration: 45, timestamp: Date.now() - 7200000 },
        { id: 3, category: 'game', duration: 120, timestamp: Date.now() - 10800000 },
        { id: 4, category: 'rest', duration: 30, timestamp: Date.now() - 14400000 },
      ];
    };

    const getWeekRecords = () => {
      const stored = localStorage.getItem('taptime_week');
      if (stored) return JSON.parse(stored);
      return {
        work: 720,
        read: 120,
        game: 360,
        rest: 120,
        exercise: 60,
        eat: 240,
      };
    };

    const getRecordDays = () => {
      const stored = localStorage.getItem('taptime_days');
      if (stored) return JSON.parse(stored);
      return ['●', '●', '●', '●', '●', '○', '·'];
    };

    function TodayScreen({ records, onAddRecord }) {
      const totalMinutes = records.reduce((sum, r) => sum + r.duration, 0);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      const getCategoryInfo = (id) => categories.find(c => c.id === id);

      const groupedRecords = records.reduce((acc, r) => {
        const cat = getCategoryInfo(r.category);
        if (!acc[r.category]) {
          acc[r.category] = { ...cat, total: 0, count: 0 };
        }
        acc[r.category].total += r.duration;
        acc[r.category].count++;
        return acc;
      }, {});

      return (
        <div style={{ padding: '24px 20px', minHeight: '100%', display: 'flex', flexDirection: 'column' }}>
          <div style={{ marginBottom: 32 }}>
            <div style={{ fontFamily: 'Fraunces, serif', fontSize: 24, fontWeight: 600, marginBottom: 8, color: '#1A1A1A' }}>
              7月8日 周二
            </div>
            <div style={{ fontSize: 14, color: '#999' }}>今天</div>
          </div>

          {Object.values(groupedRecords).length > 0 ? (
            <div style={{ flex: 1 }}>
              {Object.values(groupedRecords).map(cat => {
                const h = Math.floor(cat.total / 60);
                const m = cat.total % 60;
                const timeStr = h > 0 ? `${h}h${m > 0 ? ` ${m}min` : ''}` : `${m}min`;
                return (
                  <div 
                    key={cat.id}
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      padding: '16px',
                      background: '#fff',
                      borderRadius: 12,
                      marginBottom: 12,
                      boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
                      transition: 'all 0.2s ease',
                    }}
                  >
                    <div style={{ fontSize: 28, marginRight: 16 }}>{cat.icon}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 16, fontWeight: 500, color: '#1A1A1A' }}>{cat.name}</div>
                      <div style={{ fontSize: 13, color: '#999' }}>{cat.count} 次记录</div>
                    </div>
                    <div style={{ fontFamily: 'Fraunces, serif', fontSize: 20, fontWeight: 600, color: cat.color }}>
                      {timeStr}
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#999', fontSize: 14 }}>
              今天还没有记录，点击下方按钮开始
            </div>
          )}

          <div style={{ padding: '16px 0', borderTop: '1px solid #E5E5E5', marginTop: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 14, color: '#999' }}>共记录</span>
              <span style={{ fontFamily: 'Fraunces, serif', fontSize: 24, fontWeight: 700, color: '#C45C2E' }}>
                {hours > 0 ? `${hours}h ${minutes}min` : `${minutes}min`}
              </span>
            </div>
          </div>

          <button
            onClick={onAddRecord}
            style={{
              width: '100%',
              padding: '20px',
              background: '#1A1A1A',
              color: '#FAF9F7',
              borderRadius: 16,
              fontSize: 16,
              fontWeight: 600,
              border: 'none',
              cursor: 'pointer',
              marginTop: 12,
              transition: 'all 0.2s ease',
            }}
            onMouseEnter={(e) => e.target.style.transform = 'scale(0.98)'}
            onMouseLeave={(e) => e.target.style.transform = 'scale(1)'}
          >
            轻点记录
          </button>
        </div>
      );
    }

    function WeekScreen({ weekData, recordDays }) {
      const totalMinutes = Object.values(weekData).reduce((sum, val) => sum + val, 0);
      const hours = Math.floor(totalMinutes / 60);
      const maxVal = Math.max(...Object.values(weekData));

      return (
        <div style={{ padding: '24px 20px', minHeight: '100%' }}>
          <div style={{ marginBottom: 32 }}>
            <div style={{ fontFamily: 'Fraunces, serif', fontSize: 24, fontWeight: 600, marginBottom: 8, color: '#1A1A1A' }}>
              本周
            </div>
            <div style={{ fontSize: 14, color: '#999' }}>7月7日 - 7月13日</div>
          </div>

          <div style={{ background: '#fff', borderRadius: 16, padding: '20px', boxShadow: '0 1px 3px rgba(0,0,0,0.04)', marginBottom: 24 }}>
            {categories.filter(c => weekData[c.id] > 0).map(cat => {
              const val = weekData[cat.id] || 0;
              const h = Math.floor(val / 60);
              const m = val % 60;
              const percent = (val / maxVal) * 100;
              return (
                <div key={cat.id} style={{ marginBottom: 16, lastChild: { marginBottom: 0 } }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                    <span style={{ fontSize: 14, fontWeight: 500, color: '#1A1A1A' }}>{cat.icon} {cat.name}</span>
                    <span style={{ fontFamily: 'Fraunces, serif', fontSize: 14, fontWeight: 600, color: cat.color }}>
                      {h > 0 ? `${h}h${m > 0 ? ` ${m}m` : ''}` : `${m}min`}
                    </span>
                  </div>
                  <div style={{ height: 8, background: '#FAF9F7', borderRadius: 4, overflow: 'hidden' }}>
                    <div 
                      style={{ 
                        height: '100%', 
                        width: `${percent}%`, 
                        background: cat.color, 
                        borderRadius: 4,
                        transition: 'width 0.5s ease'
                      }} 
                    />
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 14, color: '#999', marginBottom: 12 }}>本周记录</div>
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '16px', background: '#fff', borderRadius: 12, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
              {weekDays.map((day, idx) => (
                <div key={day} style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 12, color: '#999', marginBottom: 8 }}>{day}</div>
                  <div style={{ 
                    width: 16, 
                    height: 16, 
                    borderRadius: '50%',
                    background: recordDays[idx] === '●' ? '#C45C2E' : recordDays[idx] === '○' ? '#E5E5E5' : '#FAF9F7',
                    border: recordDays[idx] !== '·' ? '1px solid #E5E5E5' : 'none'
                  }} />
                </div>
              ))}
            </div>
          </div>

          <div style={{ padding: '20px', background: '#fff', borderRadius: 12, boxShadow: '0 1px 3px rgba(0,0,0,0.04)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 14, color: '#999' }}>共记录</span>
              <span style={{ fontFamily: 'Fraunces, serif', fontSize: 28, fontWeight: 700, color: '#1A1A1A' }}>
                {hours}h
              </span>
            </div>
          </div>
        </div>
      );
    }

    function RecordModal({ onClose, onConfirm }) {
      const [selectedCategory, setSelectedCategory] = React.useState(null);
      const [selectedDuration, setSelectedDuration] = React.useState(null);

      const handleConfirm = () => {
        if (selectedCategory && selectedDuration) {
          onConfirm(selectedCategory, selectedDuration);
        }
      };

      return (
        <div style={{
          position: 'fixed',
          top: 0,
          left: 0,
          right: 0,
          bottom: 0,
          background: 'rgba(0,0,0,0.3)',
          zIndex: 100,
          display: 'flex',
          alignItems: 'flex-end',
          animation: 'fadeIn 0.2s ease',
        }}>
          <div 
            style={{
              width: '100%',
              background: '#FAF9F7',
              borderRadius: '24px 24px 0 0',
              padding: '24px 20px',
              paddingBottom: '60px',
              animation: 'slideUp 0.3s ease',
            }}
            onClick={(e) => e.stopPropagation()}
          >
            <div style={{ textAlign: 'center', marginBottom: 24 }}>
              <div style={{ fontFamily: 'Fraunces, serif', fontSize: 20, fontWeight: 600, color: '#1A1A1A' }}>
                在做什么？
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 28 }}>
              {categories.map(cat => (
                <button
                  key={cat.id}
                  onClick={() => setSelectedCategory(cat)}
                  style={{
                    padding: '16px 8px',
                    background: selectedCategory?.id === cat.id ? '#fff' : '#FAF9F7',
                    border: selectedCategory?.id === cat.id ? `2px solid ${cat.color}` : '1px solid #E5E5E5',
                    borderRadius: 12,
                    cursor: 'pointer',
                    transition: 'all 0.2s ease',
                  }}
                >
                  <div style={{ fontSize: 28, marginBottom: 6 }}>{cat.icon}</div>
                  <div style={{ fontSize: 13, color: '#1A1A1A' }}>{cat.name}</div>
                </button>
              ))}
            </div>

            <div style={{ textAlign: 'center', marginBottom: 20 }}>
              <div style={{ fontSize: 14, color: '#999' }}>多久？</div>
            </div>

            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
              {durations.map(dur => (
                <button
                  key={dur}
                  onClick={() => setSelectedDuration(dur)}
                  style={{
                    flex: 1,
                    padding: '12px',
                    background: selectedDuration === dur ? '#1A1A1A' : '#fff',
                    color: selectedDuration === dur ? '#FAF9F7' : '#1A1A1A',
                    borderRadius: 8,
                    fontSize: 13,
                    fontWeight: 500,
                    border: '1px solid #E5E5E5',
                    cursor: 'pointer',
                    transition: 'all 0.2s ease',
                  }}
                >
                  {dur}
                </button>
              ))}
            </div>

            <button
              onClick={handleConfirm}
              disabled={!selectedCategory || !selectedDuration}
              style={{
                width: '100%',
                padding: '20px',
                background: selectedCategory && selectedDuration ? '#1A1A1A' : '#E5E5E5',
                color: selectedCategory && selectedDuration ? '#FAF9F7' : '#999',
                borderRadius: 16,
                fontSize: 16,
                fontWeight: 600,
                border: 'none',
                cursor: selectedCategory && selectedDuration ? 'pointer' : 'not-allowed',
                transition: 'all 0.2s ease',
              }}
            >
              记上
            </button>
          </div>
        </div>
      );
    }

    function TabBar({ activeTab, onTabChange }) {
      return (
        <div style={{
          position: 'absolute',
          bottom: 34,
          left: 0,
          right: 0,
          height: 64,
          background: '#fff',
          display: 'flex',
          justifyContent: 'space-around',
          alignItems: 'center',
          paddingBottom: 10,
          boxShadow: '0 -1px 3px rgba(0,0,0,0.04)',
          zIndex: 5,
        }}>
          <button
            onClick={() => onTabChange('today')}
            style={{
              flex: 1,
              padding: '8px 0',
              background: 'transparent',
              border: 'none',
              cursor: 'pointer',
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              gap: 4,
            }}
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path 
                d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z" 
                fill={activeTab === 'today' ? '#1A1A1A' : '#999'} 
              />
            </svg>
            <span style={{ fontSize: 11, color: activeTab === 'today' ? '#1A1A1A' : '#999' }}>今日</span>
          </button>
          <button
            onClick={() => onTabChange('week')}
            style={{
              flex: 1,
              padding: '8px 0',
              background: 'transparent',
              border: 'none',
              cursor: 'pointer',
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              gap: 4,
            }}
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path 
                d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z" 
                fill={activeTab === 'week' ? '#1A1A1A' : '#999'} 
              />
            </svg>
            <span style={{ fontSize: 11, color: activeTab === 'week' ? '#1A1A1A' : '#999' }}>本周</span>
          </button>
        </div>
      );
    }

    function AppPhone({ initialTab = 'today' }) {
      const [activeTab, setActiveTab] = React.useState(initialTab);
      const [records, setRecords] = React.useState(getTodayRecords);
      const [weekData, setWeekData] = React.useState(getWeekRecords);
      const [recordDays, setRecordDays] = React.useState(getRecordDays);
      const [showModal, setShowModal] = React.useState(false);

      const handleAddRecord = () => setShowModal(true);

      const handleConfirmRecord = (category, duration) => {
        const newRecord = {
          id: Date.now(),
          category: category.id,
          duration: durationMinutes[duration],
          timestamp: Date.now(),
        };
        
        const newRecords = [...records, newRecord];
        setRecords(newRecords);
        localStorage.setItem('taptime_today', JSON.stringify(newRecords));

        const newWeekData = { ...weekData };
        newWeekData[category.id] = (newWeekData[category.id] || 0) + durationMinutes[duration];
        setWeekData(newWeekData);
        localStorage.setItem('taptime_week', JSON.stringify(newWeekData));

        setShowModal(false);
      };

      return (
        <IosFrame time="9:41" battery={85}>
          {activeTab === 'today' && (
            <TodayScreen records={records} onAddRecord={handleAddRecord} />
          )}
          {activeTab === 'week' && (
            <WeekScreen weekData={weekData} recordDays={recordDays} />
          )}
          <TabBar activeTab={activeTab} onTabChange={setActiveTab} />
          {showModal && (
            <RecordModal 
              onClose={() => setShowModal(false)} 
              onConfirm={handleConfirmRecord}
            />
          )}
        </IosFrame>
      );
    }

    function App() {
      return (
        <div className="container">
          <div>
            <div className="label">今日 · 记录时间</div>
            <AppPhone initialTab="today" />
          </div>
          <div>
            <div className="label">本周 · 查看分布</div>
            <AppPhone initialTab="week" />
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
</body>
</html>
